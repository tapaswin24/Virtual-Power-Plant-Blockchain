      <button onclick="resetSystem()" class="w-full flex items-center justify-center p-3 text-xs font-semibold text-[var(--text-secondary)] rounded-xl hover:text-red-400 hover:bg-white/5 transition-colors border border-transparent hover:border-red-500/10">

</div>

<script>
    // Initialize mobile menu tracking
    const btn = document.getElementById("mobileMenuBtn");
    const menu = document.getElementById("mobileMenu");
    if(btn && menu) {
        btn.onclick = () => {
            menu.classList.toggle("hidden");
            menu.classList.toggle("flex");
        };
    }
    
    // Wire up BOTH theme toggles to point to the central toggling function
    document.getElementById("themeToggleMobile").onclick = function() {
        if(window.toggleThemeGlobal) window.toggleThemeGlobal();
    };
    document.getElementById("themeToggle").onclick = function() {
        if(window.toggleThemeGlobal) window.toggleThemeGlobal();
    };

    function resetSystem() {
        if(confirm("Are you absolutely sure you want to factory-reset the VPP accumulators? This will explicitly exclude all historical ThingSpeak telemetry recorded up to this exact point in time.")) {
            fetch('/reset', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert("System successfully wiped. Restarting tracking arrays.");
                    window.location.href = '/dashboard';
                } else {
                    alert("Failed to execute destructive reset.");
                }
            }).catch(err => {
                alert("Comm error: " + err);
            });
        }
    }
</script>
