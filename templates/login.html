<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - VPP System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* CSS Variables & Glassmorphism */
:root {
  --bg-color: #0b1120;
  --bg-image: radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.15), transparent 40%),
              radial-gradient(circle at -20% 80%, rgba(6, 182, 212, 0.1), transparent 40%),
              radial-gradient(circle at 120% 80%, rgba(139, 92, 246, 0.1), transparent 40%);
  --card-bg: rgba(30, 41, 59, 0.4);
  --card-border: rgba(255, 255, 255, 0.08);
  --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
}

body {
    background-color: var(--bg-color);
    background-image: var(--bg-image);
    color: var(--text-primary);
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* Base Animations */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}
@keyframes pulseGlow {
    0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    50% { box-shadow: 0 0 20px 0 rgba(16, 185, 129, 0.3); }
    100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}

/* Glass Card */
.glass-panel {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 1.5rem;
    box-shadow: var(--card-shadow);
    animation: float 6s ease-in-out infinite;
    position: relative;
    z-index: 10;
}

/* Decorative Background Elements */
.bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    opacity: 0.5;
}
.orb-1 { width: 300px; height: 300px; background: #10b981; top: -100px; left: -100px; animation: float 8s ease-in-out infinite alternate; }
.orb-2 { width: 400px; height: 400px; background: #06b6d4; bottom: -150px; right: -150px; animation: float 12s ease-in-out infinite alternate-reverse; }

/* Input Styling */
.input-field {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    transition: all 0.3s ease;
}
.input-field:focus {
    border-color: #10b981;
    box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
    outline: none;
    transform: translateY(-1px);
}

/* Glow Button */
.glow-btn {
    background: linear-gradient(135deg, #10b981, #06b6d4);
    box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    transition: all 0.3s ease;
}
.glow-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
    background: linear-gradient(135deg, #059669, #0891b2);
}
.glow-btn:active {
    transform: translateY(1px);
}
</style>
</head>

<body>

<!-- Background Decor -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="glass-panel p-10 w-full max-w-md mx-4">

  <!-- Header -->
  <div class="text-center mb-8">
      <div class="inline-block p-4 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 mb-4" style="animation: pulseGlow 4s infinite">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
      </div>
      <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight">
        VPP Control Center
      </h2>
      <p class="text-[var(--text-secondary)] mt-2 font-medium tracking-wide text-sm uppercase">Batch-4 VPP Project</p>
  </div>

  {% if error %}
    <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm p-3 rounded-lg mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        {{ error }}
    </div>
  {% endif %}

  <!-- Form -->
  <form method="POST" class="space-y-5">
    
    <div>
        <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-1.5 ml-1">Operator ID</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <input type="text" name="username" placeholder="Enter username" required
              class="input-field w-full pl-10 pr-4 py-3 rounded-xl">
        </div>
    </div>

    <div>
        <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-1.5 ml-1">Access Key</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <input type="password" name="password" placeholder="Enter password" required
              class="input-field w-full pl-10 pr-4 py-3 rounded-xl">
        </div>
    </div>

    <button type="submit"
      class="glow-btn w-full text-white font-bold tracking-wide py-3.5 rounded-xl flex justify-center items-center gap-2 mt-4">
      <span>Secure Login</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" />
      </svg>
    </button>

  </form>

  <!-- Footer Footer -->
  <div class="mt-8 text-center border-t border-[var(--card-border)] pt-4">
      <p class="text-xs text-gray-500">Authorized personnel only.</p>
      <div class="flex items-center justify-center gap-1 mt-1 opacity-60">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
          <p class="text-[10px] text-emerald-500 uppercase tracking-widest font-semibold">Node Online</p>
      </div>
  </div>

</div>

</body>
</html>
